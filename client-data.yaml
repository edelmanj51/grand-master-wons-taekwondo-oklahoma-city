ABOUT_TEXT: "Grand Master Won's Taekwondo has been a pillar of Oklahoma City's martial arts community since 1980. Under Great Grandmaster In Hui Won — 10th Dan and President of the World Taekwondo Hanmookwan Federation — the school cultivates champions, confidence, and character through world-class Taekwondo instruction."

INSTRUCTOR_1_NAME: "Great Grandmaster In Hui Won"
INSTRUCTOR_1_PHOTO: images/stock/instructor.webp
INSTRUCTOR_1_TITLE: "10th Dan · Founder & Head Instructor"
INSTRUCTOR_1_BIO: "Great Grandmaster In Hui Won holds a 10th Degree Black Belt and serves as President of the World Taekwondo Hanmookwan Federation, the US Central Taekwondo Association, and the Oklahoma State Taekwondo Association. Since founding the school in 1980, he has trained thousands of students and built one of the most respected Taekwondo organizations in the central United States."

INSTRUCTOR_2_NAME: "Grandmaster John Carpenter"
INSTRUCTOR_2_TITLE: "9th Dan · Secretary General, World Hanmookwan Federation"
INSTRUCTOR_2_BIO: "Grandmaster John Carpenter holds a 9th Degree Black Belt and a 4th Degree Hapkido certification. A Class A1 USA Taekwondo Referee, he serves as Vice President of the Oklahoma State Taekwondo Association and has dedicated decades to building the school's competitive program."

